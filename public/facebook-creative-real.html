<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fahrzeugpflege Chouman - Vorher/Nachher Showcase</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 50%, #0F172A 100%);
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .creative-container {
            width: 1080px;
            height: 1080px;
            position: relative;
            background: linear-gradient(135deg, #000 0%, #1a1a1a 50%, #000 100%);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 255, 136, 0.3);
        }
        
        /* Background Animation */
        .bg-animation {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 20%, rgba(0, 255, 136, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0, 191, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 60%, rgba(255, 107, 107, 0.1) 0%, transparent 50%);
            animation: bgPulse 4s ease-in-out infinite;
        }
        
        @keyframes bgPulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }
        
        /* Header */
        .header {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 10;
        }
        
        .logo {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #00FF88, #00BFFF);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            animation: logoSpin 6s linear infinite;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.5);
        }
        
        @keyframes logoSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .logo::before {
            content: "🚗";
            font-size: 60px;
            animation: logoSpin 6s linear infinite reverse;
        }
        
        .title {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(45deg, #00FF88, #00BFFF, #FF6B6B);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 3s ease-in-out infinite;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
        }
        
        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        .subtitle {
            font-size: 24px;
            color: #fff;
            font-weight: 600;
            opacity: 0.9;
        }
        
        /* Main Content - Image Showcase */
        .main-content {
            position: absolute;
            top: 220px;
            left: 50%;
            transform: translateX(-50%);
            width: 950px;
            height: 650px;
        }
        
        /* Image Grid */
        .image-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            height: 500px;
            margin-bottom: 40px;
        }
        
        .image-showcase {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: imageFloat 6s ease-in-out infinite;
        }
        
        .image-showcase:nth-child(1) { animation-delay: 0s; }
        .image-showcase:nth-child(2) { animation-delay: 1.5s; }
        .image-showcase:nth-child(3) { animation-delay: 3s; }
        .image-showcase:nth-child(4) { animation-delay: 4.5s; }
        
        @keyframes imageFloat {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-10px) scale(1.02); }
        }
        
        .image-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        .before-after-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            transition: all 0.8s ease;
        }
        
        .before-image {
            z-index: 2;
            animation: slideReveal 8s ease-in-out infinite;
        }
        
        .after-image {
            z-index: 1;
        }
        
        @keyframes slideReveal {
            0%, 20% { clip-path: inset(0 0 0 0); }
            40%, 60% { clip-path: inset(0 50% 0 0); }
            80%, 100% { clip-path: inset(0 100% 0 0); }
        }
        
        /* Image Labels */
        .image-label {
            position: absolute;
            top: 15px;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 14px;
            z-index: 5;
            animation: labelPulse 2s ease-in-out infinite;
        }
        
        .before-label {
            left: 15px;
            background: rgba(255, 107, 107, 0.9);
            color: white;
            animation-delay: 0s;
        }
        
        .after-label {
            right: 15px;
            background: rgba(0, 255, 136, 0.9);
            color: white;
            animation-delay: 4s;
        }
        
        @keyframes labelPulse {
            0%, 50%, 100% { transform: scale(1); opacity: 0.8; }
            25% { transform: scale(1.1); opacity: 1; }
        }
        
        /* Service Labels */
        .service-label {
            position: absolute;
            bottom: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: 600;
            z-index: 5;
        }
        
        /* CTA Section */
        .cta-section {
            text-align: center;
            animation: ctaBounce 3s ease-in-out infinite;
        }
        
        @keyframes ctaBounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }
        
        .cta-text {
            font-size: 36px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }
        
        .cta-button {
            display: inline-block;
            padding: 18px 45px;
            background: linear-gradient(45deg, #00FF88, #00BFFF);
            color: #000;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 700;
            font-size: 28px;
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.4);
            animation: buttonGlow 2s ease-in-out infinite;
            transition: transform 0.3s ease;
        }
        
        .cta-button:hover {
            transform: scale(1.05);
        }
        
        @keyframes buttonGlow {
            0%, 100% { box-shadow: 0 10px 30px rgba(0, 255, 136, 0.4); }
            50% { box-shadow: 0 15px 40px rgba(0, 255, 136, 0.8); }
        }
        
        /* Floating Elements */
        .floating-element {
            position: absolute;
            color: rgba(255, 255, 255, 0.1);
            font-size: 60px;
            animation: float 6s ease-in-out infinite;
        }
        
        .floating-element:nth-child(1) {
            top: 10%;
            left: 10%;
            animation-delay: 0s;
        }
        
        .floating-element:nth-child(2) {
            top: 20%;
            right: 10%;
            animation-delay: 2s;
        }
        
        .floating-element:nth-child(3) {
            bottom: 25%;
            left: 15%;
            animation-delay: 4s;
        }
        
        .floating-element:nth-child(4) {
            bottom: 15%;
            right: 15%;
            animation-delay: 1s;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            33% { transform: translateY(-20px) rotate(5deg); }
            66% { transform: translateY(10px) rotate(-5deg); }
        }
        
        /* Sparkle Effect */
        .sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #00FF88;
            border-radius: 50%;
            animation: sparkle 3s linear infinite;
        }
        
        @keyframes sparkle {
            0% { opacity: 0; transform: scale(0); }
            50% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0); }
        }
        
        /* Generate sparkles */
        .sparkle:nth-child(1) { top: 15%; left: 25%; animation-delay: 0s; }
        .sparkle:nth-child(2) { top: 25%; right: 30%; animation-delay: 0.5s; }
        .sparkle:nth-child(3) { bottom: 35%; left: 20%; animation-delay: 1s; }
        .sparkle:nth-child(4) { bottom: 25%; right: 25%; animation-delay: 1.5s; }
        .sparkle:nth-child(5) { top: 40%; left: 80%; animation-delay: 2s; }
        .sparkle:nth-child(6) { top: 60%; left: 15%; animation-delay: 2.5s; }
        .sparkle:nth-child(7) { bottom: 40%; right: 35%; animation-delay: 3s; }
        .sparkle:nth-child(8) { top: 35%; right: 45%; animation-delay: 3.5s; }
        
        /* Contact Info */
        .contact-info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            font-size: 18px;
            font-weight: 600;
        }
        
        .phone {
            color: #00FF88;
            text-decoration: none;
            font-weight: 700;
            font-size: 20px;
        }
        
        /* Progress Bar */
        .progress-bar {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00FF88, #00BFFF);
            border-radius: 2px;
            animation: progressFill 8s linear infinite;
        }
        
        @keyframes progressFill {
            0% { width: 0%; }
            100% { width: 100%; }
        }
    </style>
</head>
