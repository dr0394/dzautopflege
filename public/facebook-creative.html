<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fahrzeugpflege Chouman - Vorher/Nachher</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .creative-container {
            width: 1080px;
            height: 1080px;
            position: relative;
            background: linear-gradient(135deg, #000 0%, #1a1a1a 50%, #000 100%);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 255, 136, 0.3);
        }
        
        /* Background Animation */
        .bg-animation {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 20%, rgba(0, 255, 136, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0, 191, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 60%, rgba(255, 107, 107, 0.1) 0%, transparent 50%);
            animation: bgPulse 4s ease-in-out infinite;
        }
        
        @keyframes bgPulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }
        
        /* Header */
        .header {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 10;
        }
        
        .logo {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #00FF88, #00BFFF);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            animation: logoSpin 6s linear infinite;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.5);
        }
        
        @keyframes logoSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .logo::before {
            content: "🚗";
            font-size: 60px;
            animation: logoSpin 6s linear infinite reverse;
        }
        
        .title {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(45deg, #00FF88, #00BFFF, #FF6B6B);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 3s ease-in-out infinite;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
        }
        
        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        .subtitle {
            font-size: 24px;
            color: #fff;
            font-weight: 600;
            opacity: 0.9;
        }
        
        /* Main Content */
        .main-content {
            position: absolute;
            top: 250px;
            left: 50%;
            transform: translateX(-50%);
            width: 900px;
            height: 600px;
        }
        
        /* Before/After Container */
        .before-after-container {
            position: relative;
            width: 100%;
            height: 500px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            margin-bottom: 40px;
        }
        
        .car-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            transition: all 0.5s ease;
        }
        
        .before-image {
            background-image: url('https://image.jimcdn.com/app/cms/image/transf/none/path/sda27861925bed8a3/image/i0c955180a4d0cf0f/version/1600421817/image.jpg');
            animation: slideReveal 8s ease-in-out infinite;
        }
        
        .after-image {
            background-image: url('https://image.jimcdn.com/app/cms/image/transf/none/path/sda27861925bed8a3/image/i89b2602e50487594/version/1600422081/image.jpg');
            clip-path: inset(0 100% 0 0);
            animation: slideRevealAfter 8s ease-in-out infinite;
        }
        
        @keyframes slideReveal {
            0%, 20% { clip-path: inset(0 0 0 0); }
            40%, 60% { clip-path: inset(0 50% 0 0); }
            80%, 100% { clip-path: inset(0 100% 0 0); }
        }
        
        @keyframes slideRevealAfter {
            0%, 20% { clip-path: inset(0 100% 0 0); }
            40%, 60% { clip-path: inset(0 50% 0 0); }
            80%, 100% { clip-path: inset(0 0 0 0); }
        }
        
        /* Labels */
        .image-label {
            position: absolute;
            top: 20px;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: 700;
            font-size: 18px;
            z-index: 5;
            animation: labelPulse 2s ease-in-out infinite;
        }
        
        .before-label {
            left: 20px;
            background: rgba(255, 107, 107, 0.9);
            color: white;
            animation-delay: 0s;
        }
        
        .after-label {
            right: 20px;
            background: rgba(0, 255, 136, 0.9);
            color: white;
            animation-delay: 4s;
        }
        
        @keyframes labelPulse {
            0%, 50%, 100% { transform: scale(1); opacity: 0.8; }
            25% { transform: scale(1.1); opacity: 1; }
        }
        
        /* Divider Line */
        .divider {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 50%;
            width: 4px;
            background: linear-gradient(to bottom, #00FF88, #00BFFF);
            transform: translateX(-50%);
            z-index: 6;
            animation: dividerMove 8s ease-in-out infinite;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.8);
        }
        
        @keyframes dividerMove {
            0%, 20% { left: 0%; }
            40%, 60% { left: 50%; }
            80%, 100% { left: 100%; }
        }
        
        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            background: linear-gradient(45deg, #00FF88, #00BFFF);
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.8);
        }
        
        .divider::after {
            content: '↔';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 20px;
            font-weight: bold;
        }
        
        /* CTA Section */
        .cta-section {
            text-align: center;
            animation: ctaBounce 3s ease-in-out infinite;
        }
        
        @keyframes ctaBounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }
        
        .cta-text {
            font-size: 32px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }
        
        .cta-button {
            display: inline-block;
            padding: 15px 40px;
            background: linear-gradient(45deg, #00FF88, #00BFFF);
            color: #000;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 700;
            font-size: 24px;
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.4);
            animation: buttonGlow 2s ease-in-out infinite;
            transition: transform 0.3s ease;
        }
        
        .cta-button:hover {
            transform: scale(1.05);
        }
        
        @keyframes buttonGlow {
            0%, 100% { box-shadow: 0 10px 30px rgba(0, 255, 136, 0.4); }
            50% { box-shadow: 0 15px 40px rgba(0, 255, 136, 0.8); }
        }
        
        /* Floating Elements */
        .floating-element {
            position: absolute;
            color: rgba(255, 255, 255, 0.1);
            font-size: 60px;
            animation: float 6s ease-in-out infinite;
        }
        
        .floating-element:nth-child(1) {
            top: 10%;
            left: 10%;
            animation-delay: 0s;
        }
        
        .floating-element:nth-child(2) {
            top: 20%;
            right: 10%;
            animation-delay: 2s;
        }
        
        .floating-element:nth-child(3) {
            bottom: 20%;
            left: 15%;
            animation-delay: 4s;
        }
        
        .floating-element:nth-child(4) {
            bottom: 10%;
            right: 15%;
            animation-delay: 1s;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            33% { transform: translateY(-20px) rotate(5deg); }
            66% { transform: translateY(10px) rotate(-5deg); }
        }
        
        /* Sparkle Effect */
        .sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #00FF88;
            border-radius: 50%;
            animation: sparkle 3s linear infinite;
        }
        
        @keyframes sparkle {
            0% { opacity: 0; transform: scale(0); }
            50% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0); }
        }
        
        /* Generate sparkles */
        .sparkle:nth-child(1) { top: 15%; left: 25%; animation-delay: 0s; }
        .sparkle:nth-child(2) { top: 25%; right: 30%; animation-delay: 0.5s; }
        .sparkle:nth-child(3) { bottom: 30%; left: 20%; animation-delay: 1s; }
        .sparkle:nth-child(4) { bottom: 20%; right: 25%; animation-delay: 1.5s; }
        .sparkle:nth-child(5) { top: 40%; left: 80%; animation-delay: 2s; }
        .sparkle:nth-child(6) { top: 60%; left: 15%; animation-delay: 2.5s; }
        
        /* Contact Info */
        .contact-info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            font-size: 16px;
            font-weight: 600;
        }
        
        .phone {
            color: #00FF88;
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="creative-container">
        <!-- Background Animation -->
        <div class="bg-animation"></div>
        
        <!-- Floating Elements -->
        <div class="floating-element">🚗</div>
        <div class="floating-element">✨</div>
        <div class="floating-element">🧽</div>
        <div class="floating-element">💎</div>
        
        <!-- Sparkles -->
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        
        <!-- Header -->
        <div class="header">
            <div class="logo"></div>
            <h1 class="title">LP</h1>
            <p class="subtitle">Velbert</p>
        </div>
        
        <!-- Main Content -->
        <div class="main-content">
            <div class="before-after-container">
                <div class="car-image before-image"></div>
                <div class="car-image after-image"></div>
                <div class="divider"></div>
                <div class="image-label before-label">VORHER 😔</div>
                <div class="image-label after-label">NACHHER ✨</div>
            </div>
            
            <div class="cta-section">
                <div class="cta-text">WOW-EFFEKT GARANTIERT!</div>
                <a href="tel:01636218490" class="cta-button">JETZT ANRUFEN</a>
            </div>
        </div>
        
        <!-- Contact Info -->
        <div class="contact-info">
            📞 <a href="tel:01636218490" class="phone">0163 621 84 90</a> | 📍 Mülheim/Ruhr
        </div>
    </div>
</body>
</html>
